name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Se ejecutará al subir cambios a la rama principal

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist  # La carpeta generada por Vite
          branch: gh-pages  # La rama donde se publicará la página web
